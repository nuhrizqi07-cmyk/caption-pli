<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS Kit — Bea Cukai Pasuruan</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0a1628;
    --navy2: #0f2044;
    --gold: #c9a227;
    --gold2: #f0c94a;
    --teal: #00b8a9;
    --teal2: #00d4c2;
    --red: #e63946;
    --surface: #111d35;
    --surface2: #162240;
    --surface3: #1e2f54;
    --border: rgba(201,162,39,0.18);
    --text: #e8edf5;
    --muted: #7a8aaa;
    --white: #ffffff;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--navy);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid texture */
  body::before {
    content:'';
    position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(201,162,39,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,162,39,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events:none;
    z-index:0;
  }

  /* ── HEADER ── */
  header {
    position: relative; z-index:10;
    background: linear-gradient(135deg, var(--navy2) 0%, #0b1e3d 100%);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex; align-items: center; gap: 16px;
    height: 64px;
    box-shadow: 0 4px 32px rgba(0,0,0,0.4);
  }

  .logo-badge {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 800; color: var(--navy);
    box-shadow: 0 0 20px rgba(201,162,39,0.4);
    flex-shrink:0;
  }

  .header-title { flex:1; }
  .header-title h1 { font-size: 15px; font-weight: 700; color: var(--white); letter-spacing:0.3px; }
  .header-title p  { font-size: 11px; color: var(--gold); letter-spacing:1.2px; text-transform:uppercase; margin-top:1px; }

  .header-badge {
    background: rgba(0,184,169,0.15);
    border: 1px solid rgba(0,184,169,0.3);
    color: var(--teal2);
    font-size: 11px; font-weight: 600;
    padding: 4px 12px; border-radius: 20px;
    letter-spacing:0.5px;
  }

  /* ── LAYOUT ── */
  .app {
    position: relative; z-index:1;
    display: grid;
    grid-template-columns: 260px 1fr 320px;
    grid-template-rows: auto 1fr;
    height: calc(100vh - 64px);
  }

  /* ── SEARCH BAR ── */
  .search-bar {
    grid-column: 1 / -1;
    padding: 16px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; gap: 12px; align-items: center;
  }

  .search-wrap {
    flex:1; position:relative;
  }
  .search-wrap input {
    width:100%; background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 16px 10px 40px;
    color: var(--text); font-family: inherit; font-size: 14px;
    outline:none; transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-wrap input:focus {
    border-color: rgba(201,162,39,0.5);
    box-shadow: 0 0 0 3px rgba(201,162,39,0.08);
  }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-icon {
    position:absolute; left:13px; top:50%; transform:translateY(-50%);
    color: var(--muted); font-size:15px;
  }

  .stats-pill {
    display:flex; gap:8px;
  }
  .pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 12px; color: var(--muted);
    white-space:nowrap;
  }
  .pill span { color: var(--gold); font-weight:700; }

  /* ── SIDEBAR KATEGORI ── */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto; padding: 16px 0;
  }
  .sidebar::-webkit-scrollbar { width:4px; }
  .sidebar::-webkit-scrollbar-track { background:transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--surface3); border-radius:4px; }

  .sidebar-label {
    font-size: 10px; font-weight: 700; letter-spacing:1.5px;
    text-transform:uppercase; color: var(--muted);
    padding: 8px 20px 6px;
  }

  .cat-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 20px; cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.15s;
    position: relative;
  }
  .cat-item:hover { background: var(--surface2); }
  .cat-item.active {
    background: rgba(201,162,39,0.1);
    border-left-color: var(--gold);
  }
  .cat-icon {
    width: 32px; height: 32px; border-radius: 8px;
    display:flex; align-items:center; justify-content:center;
    font-size:16px; flex-shrink:0;
  }
  .cat-text { flex:1; min-width:0; }
  .cat-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .cat-count {
    font-size: 10px; font-weight: 700;
    background: var(--surface3);
    color: var(--muted);
    padding: 2px 8px; border-radius: 20px;
    font-family: 'JetBrains Mono', monospace;
  }
  .cat-item.active .cat-count {
    background: rgba(201,162,39,0.2);
    color: var(--gold);
  }

  /* ── MAIN: TEMPLATE LIST ── */
  .main {
    overflow-y: auto;
    background: var(--navy);
  }
  .main::-webkit-scrollbar { width:4px; }
  .main::-webkit-scrollbar-track { background:transparent; }
  .main::-webkit-scrollbar-thumb { background: var(--surface3); border-radius:4px; }

  .main-inner { padding: 20px; display:flex; flex-direction:column; gap:10px; }

  .section-head {
    display:flex; align-items:center; gap:10px; margin-bottom:4px; margin-top:8px;
  }
  .section-head:first-child { margin-top:0; }
  .section-head h2 { font-size:13px; font-weight:700; color:var(--muted); letter-spacing:1px; text-transform:uppercase; }
  .section-line { flex:1; height:1px; background: var(--border); }

  .tpl-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative; overflow:hidden;
  }
  .tpl-card::before {
    content:''; position:absolute; left:0; top:0; bottom:0;
    width:3px; background: transparent; transition: background 0.2s;
  }
  .tpl-card:hover { background: var(--surface2); border-color: rgba(201,162,39,0.3); transform: translateX(2px); }
  .tpl-card:hover::before { background: var(--gold); }
  .tpl-card.selected { background: var(--surface2); border-color: var(--teal); }
  .tpl-card.selected::before { background: var(--teal); }

  .tpl-top { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:6px; }
  .tpl-title { font-size: 13px; font-weight: 700; color: var(--white); }
  .tpl-tag {
    font-size: 10px; font-weight: 600; letter-spacing:0.5px;
    padding: 2px 8px; border-radius: 4px; white-space:nowrap; flex-shrink:0;
  }
  .tag-wa  { background: rgba(37,211,102,0.15); color:#25d366; border:1px solid rgba(37,211,102,0.2); }
  .tag-ig  { background: rgba(225,48,108,0.15);  color:#e1306c; border:1px solid rgba(225,48,108,0.2); }
  .tag-all { background: rgba(201,162,39,0.15);   color:var(--gold); border:1px solid rgba(201,162,39,0.2); }

  .tpl-preview {
    font-size: 12px; color: var(--muted); line-height: 1.5;
    display: -webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  }

  /* ── PREVIEW PANEL ── */
  .preview {
    background: var(--surface);
    border-left: 1px solid var(--border);
    display:flex; flex-direction:column;
    overflow:hidden;
  }

  .preview-head {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .preview-head h3 { font-size: 13px; font-weight:700; color:var(--white); margin-bottom:2px; }
  .preview-head p  { font-size: 11px; color: var(--muted); }

  .preview-body {
    flex:1; overflow-y:auto; padding: 20px;
  }
  .preview-body::-webkit-scrollbar { width:4px; }
  .preview-body::-webkit-scrollbar-track { background:transparent; }
  .preview-body::-webkit-scrollbar-thumb { background: var(--surface3); border-radius:4px; }

  .preview-empty {
    height:100%; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:12px;
    color: var(--muted);
  }
  .preview-empty .icon { font-size:40px; opacity:0.3; }
  .preview-empty p { font-size:13px; text-align:center; line-height:1.6; }

  .bubble-wrap {
    background: #e5ddd5;
    border-radius: 12px; overflow:hidden;
    margin-bottom:16px;
  }
  .bubble-header {
    background: #075e54;
    padding: 10px 14px;
    display:flex; align-items:center; gap:10px;
  }
  .bubble-avatar {
    width:32px; height:32px; border-radius:50%;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    display:flex; align-items:center; justify-content:center;
    font-size:14px; color:var(--navy); font-weight:800;
  }
  .bubble-name { font-size:13px; font-weight:600; color:#fff; }
  .bubble-sub  { font-size:10px; color:rgba(255,255,255,0.7); }

  .bubble-content { padding: 12px; }
  .bubble {
    background: #fff;
    border-radius: 0 8px 8px 8px;
    padding: 10px 12px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    max-width:90%;
    margin-bottom: 4px;
  }
  .bubble p {
    font-size: 13px; color: #303030; line-height:1.6;
    white-space: pre-wrap; font-family: inherit;
  }
  .bubble-time { font-size: 10px; color: #999; text-align:right; margin-top:4px; }

  .var-section {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px; padding:14px; margin-bottom:16px;
  }
  .var-title { font-size:11px; font-weight:700; color:var(--gold); letter-spacing:1px; text-transform:uppercase; margin-bottom:10px; }
  .var-grid { display:flex; flex-direction:column; gap:8px; }
  .var-row { display:flex; flex-direction:column; gap:4px; }
  .var-label { font-size:11px; color:var(--muted); font-weight:600; }
  .var-input {
    background: var(--navy); border:1px solid var(--border);
    border-radius:6px; padding:7px 10px;
    color:var(--text); font-family:'JetBrains Mono',monospace; font-size:12px;
    outline:none; transition: border-color 0.2s;
    width:100%;
  }
  .var-input:focus { border-color: var(--teal); }

  .preview-footer {
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface2);
    display:flex; gap:8px;
  }

  .btn {
    border:none; cursor:pointer; font-family:inherit;
    font-size:13px; font-weight:600; border-radius:8px;
    padding:9px 16px; transition: all 0.2s;
    display:flex; align-items:center; gap:6px;
  }
  .btn-copy {
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    color: var(--navy); flex:1; justify-content:center;
  }
  .btn-copy:hover { transform:translateY(-1px); box-shadow:0 4px 16px rgba(201,162,39,0.35); }
  .btn-wa {
    background: #25d366; color:#fff;
    padding: 9px 14px;
  }
  .btn-wa:hover { background:#1da851; }

  .copy-toast {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(60px);
    background: var(--teal); color:#fff;
    padding:10px 24px; border-radius:40px;
    font-size:13px; font-weight:600;
    box-shadow: 0 8px 32px rgba(0,184,169,0.4);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    z-index:999;
  }
  .copy-toast.show { transform:translateX(-50%) translateY(0); }

  /* scrollbar for main */
  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius:6px; }
</style>
</head>

  // ── FAQ: IMEI ──
  { id:21, cat:'imei', channel:'all', title:'FAQ IMEI — Apa itu Registrasi IMEI?',
    vars:['nama'],
    text:`Halo Bapak/Ibu *[nama]* 📱

*Apa itu Registrasi IMEI?*

IMEI (International Mobile Equipment Identity) adalah nomor identitas unik perangkat telekomunikasi (HP, tablet, dll).

📋 *Mengapa harus didaftarkan?*
Perangkat yang dibeli dari luar negeri wajib didaftarkan IMEI-nya ke Bea Cukai agar dapat digunakan dengan SIM Card Indonesia. Tanpa registrasi, perangkat akan terblokir dari jaringan seluler Indonesia.

✅ *Siapa yang wajib daftar?*
• Penumpang yang membawa HP dari luar negeri
• Awak sarana pengangkut
• Penerima barang kiriman dari luar negeri

📌 *Batas waktu pendaftaran:*
Paling lambat *60 hari* setelah tiba di Indonesia.

*Maksimal 2 unit* perangkat per penumpang/awak.

🌐 Cek status IMEI: *www.beacukai.go.id/cek-imei*

Ada pertanyaan lebih lanjut? 😊` },

  { id:22, cat:'imei', channel:'all', title:'FAQ IMEI — Cara Daftar IMEI',
    vars:['nama'],

📝 Isi formulir pendaftaran IMEI
🎫 Simpan barcode hasil registrasi

*Langkah 2 — Dokumen yang dibawa ke kantor:*

  { id:23, cat:'imei', channel:'all', title:'FAQ IMEI — Tarif Pajak HKT Bawaan Penumpang',
    vars:['nama'],
    text:`Halo Bapak/Ibu *[nama]* 💰

📌 Dasar: *PER-13/BC/2021 jo PER-7/BC/2023* & *PMK 34/2025*

  { id:24, cat:'imei', channel:'wa', title:'FAQ IMEI — Status IMEI Terblokir',

  // ── FAQ: NPPBKC ──
  { id:25, cat:'nppbkc', channel:'all', title:'FAQ NPPBKC — Apa itu NPPBKC?',
    vars:['nama'],
    text:`Halo Bapak/Ibu *[nama]* 🏭

*Apa itu NPPBKC?*

NPPBKC (Nomor Pokok Pengusaha Barang Kena Cukai) adalah *izin wajib* yang harus dimiliki sebelum menjalankan kegiatan usaha di bidang cukai.

📋 *Siapa yang wajib memiliki NPPBKC?*
• Pengusaha Pabrik (hasil tembakau, etil alkohol, MMEA)
• Pengusaha Tempat Penyimpanan
• Importir Barang Kena Cukai
• Penyalur BKC
• Pengusaha Tempat Penjualan Eceran (PTPE)

⚠️ *Barang Kena Cukai (BKC) di Indonesia:*
1. Etil Alkohol (EA)
2. Minuman Mengandung Etil Alkohol (MMEA)
3. Hasil Tembakau (HT) — termasuk rokok, cerutu, tembakau iris

📌 *Dasar hukum:*
UU No. 11/1995 jo UU No. 39/2007 tentang Cukai, PP No. 72/2008, PMK No. 66/PMK.04/2018 jo PMK No. 68/2023.

Butuh info pengajuan? 😊` },

  { id:26, cat:'nppbkc', channel:'all', title:'FAQ NPPBKC — Syarat & Alur 2 Tahap',
    vars:['nama'],
    text:`Halo Bapak/Ibu *[nama]* 📋

Pengajuan NPPBKC dilakukan dalam *2 Tahap*:

━━━━━━━━━━━━━━━━
📌 *TAHAP 1 — Permohonan Periksa Lokasi*
━━━━━━━━━━━━━━━━
Dokumen yang dilampirkan:
✅ Surat Permohonan Periksa Lokasi
✅ Gambar denah situasi sekitar lokasi
✅ Gambar denah dalam lokasi / bangunan
✅ Salinan NIB
✅ Surat Kuasa (jika dikuasakan)

⏱️ Petugas menerbitkan *Berita Acara Pemeriksaan (BAP)* paling lambat *5 hari kerja*.

━━━━━━━━━━━━━━━━
📌 *TAHAP 2 — Permohonan NPPBKC*
━━━━━━━━━━━━━━━━
Dokumen yang dilampirkan:
✅ Surat Permohonan NPPBKC (bermaterai, ttd pimpinan)
✅ BAP Lokasi dari Tahap 1 (berlaku 3 bulan)
✅ NIB / Izin usaha dari instansi terkait
✅ Daftar mesin (khusus Pengusaha Pabrik)
✅ Daftar penyalur tingkat pertama (khusus Pabrik HT)
✅ Surat Pernyataan tidak keberatan dibekukan/dicabut
✅ Surat Pernyataan bertanggung jawab atas kegiatan usaha

⏱️ Keputusan diterbitkan paling lambat *3 hari kerja*.

📌 Dasar hukum: *PMK 66/PMK.04/2018 jo PMK 68/2023* & *PER-14/BC/2023*

Butuh bantuan lebih lanjut? 🙏` },

  { id:27, cat:'nppbkc', channel:'all', title:'FAQ NPPBKC — Perpanjangan & Pembekuan',
    vars:['nama'],
    text:`Halo Bapak/Ibu *[nama]* 🔄

Informasi terkait *perpanjangan dan pembekuan NPPBKC*:

🔁 *Perpanjangan NPPBKC:*
NPPBKC untuk *penyalur dan PTPE* berlaku untuk jangka waktu tertentu dan wajib diperpanjang.
• Ajukan perpanjangan *sebelum masa berlaku habis*
• Dokumen: sama dengan pengajuan baru + NPPBKC lama

⛔ *NPPBKC dapat dibekukan jika:*
• Pengusaha tidak lagi memenuhi persyaratan fisik
• Terdapat pelanggaran ketentuan cukai
• Tidak menyampaikan laporan bulanan

❌ *NPPBKC dapat dicabut jika:*
• Pengusaha secara sukarela mengajukan pencabutan
• Pailit atau likuidasi
• Pembekuan tidak diselesaikan dalam jangka waktu yang ditentukan
• Melakukan pelanggaran berat

📋 Dasar hukum: *PMK 68 Tahun 2023* dan *PER-14/BC/2023*

Ada pertanyaan lebih lanjut? 😊` },

  // ── FAQ: KAWASAN BERIKAT ──
  { id:28, cat:'kb', channel:'all', title:'FAQ KB — Apa itu Kawasan Berikat?',
    vars:['nama'],
    text:`Halo Bapak/Ibu *[nama]* 🏗️

*Apa itu Kawasan Berikat (KB)?*

Kawasan Berikat adalah salah satu jenis *Tempat Penimbunan Berikat (TPB)* yang digunakan untuk:
• Menimbun *barang impor* dan/atau barang dari dalam negeri
• Melakukan *pengolahan atau penggabungan* barang
• Sebelum *diekspor* atau diimpor untuk dipakai

💡 *Sederhananya:*
KB adalah kawasan industri berorientasi ekspor yang mendapat *fasilitas fiskal dan non-fiskal* dari Bea Cukai.

📌 *Dasar hukum:*
• PMK No. 65 Tahun 2021 tentang Kawasan Berikat
• Perdirjen BC No. 9 Tahun 2021

🏭 *Jenis TPB lainnya:*
• Gudang Berikat (GB)
• Pusat Logistik Berikat (PLB)
• Toko Bebas Bea (TBB)
• Tempat Penyelenggaraan Pameran Berikat (TPPB)

Butuh info fasilitas atau cara daftar? 😊` },

  { id:29, cat:'kb', channel:'all', title:'FAQ KB — Fasilitas Kawasan Berikat',
    vars:['nama'],
    text:`Halo Bapak/Ibu *[nama]* 🎁

💰 *Fasilitas Fiskal:*
✅ *Penangguhan Bea Masuk* — BM tidak dibayar saat impor, hanya saat barang keluar ke TLDDP
✅ *Pembebasan Cukai* — selama barang masih dalam KB
✅ *PPN & PPnBM Impor tidak dipungut*
✅ *PPh Pasal 22 Impor tidak dipungut*
✅ *PPN tidak dipungut* untuk pembelian barang lokal ke KB

🏢 *Fasilitas Non-Fiskal:*
✅ Penangguhan ketentuan lartas (tata niaga impor)
✅ Pengeluaran barang secara parsial
✅ Pemberitahuan pabean terotomasi (sistem digital)
✅ Manfaat Free Trade Agreement (FTA)
✅ Pemeriksaan pabean di lokasi pabrik
✅ Subkontrak pekerjaan ke pihak ketiga

📈 *Manfaat:*
Meningkatkan daya saing industri berorientasi ekspor dengan efisiensi biaya logistik.

  { id:30, cat:'kb', channel:'all', title:'FAQ KB — Cara Pengajuan Izin Kawasan Berikat',
    vars:['nama'],
    text:`Halo Bapak/Ibu *[nama]* 📋

  // ── FAQ: ROKOK ILEGAL ──
  { id:36, cat:'rokokilegal', channel:'all', title:'FAQ Rokok Ilegal — Mengenali Rokok Ilegal',
    vars:['nama'],
    text:`Halo Bapak/Ibu *[nama]* 🚭

*Apa itu Rokok Ilegal?*

Rokok ilegal adalah rokok yang beredar tanpa memenuhi ketentuan cukai. Ada beberapa jenisnya:

🔴 *5 Jenis Rokok Ilegal:*
1️⃣ *Rokok Polos* — tidak dilekati pita cukai sama sekali
2️⃣ *Pita Cukai Palsu* — menggunakan pita cukai tiruan / dipalsukan
3️⃣ *Pita Cukai Bekas* — menggunakan pita cukai yang sudah pernah dipakai
4️⃣ *Salah Peruntukan* — jenis produk tidak sesuai pita cukai yang dilekati
5️⃣ *Salah Personalisasi* — merek/pabrik tidak sesuai yang tertera di pita cukai

✅ *Ciri Rokok LEGAL:*
• Ada pita cukai asli yang terlekat pada kemasan
• Nama pabrik, merek & jenis produk sesuai pita
• Pita cukai utuh (tidak bekas pakai)
• Terdapat hologram, tinta UV & microtext pada pita

💡 *Dampak rokok ilegal:*
Merugikan negara triliunan rupiah, melemahkan industri dalam negeri, dan membahayakan konsumen.

Ingin tahu sanksi atau cara lapor? 😊` },

  { id:37, cat:'rokokilegal', channel:'all', title:'FAQ Rokok Ilegal — Sanksi Pidana',
    vars:['nama'],
    text:`Halo Bapak/Ibu *[nama]* ⚖️

🔴 *Pasal 54 — Menjual/mengedarkan tanpa pita cukai:*
• Penjara: *1–5 tahun*
• Denda: *2–10× nilai cukai* yang seharusnya dibayar

🔴 *Pasal 55 — Pita cukai palsu/bekas:*
• Penjara: *1–8 tahun*
• Denda: *10–20× nilai cukai* yang seharusnya dibayar

🔴 *Pasal 58 — Pita cukai salah peruntukan/personalisasi:*
• Penjara: *1–5 tahun*

⚠️ Sanksi berlaku untuk: produsen, distributor, penjual, dan pembeli dalam jumlah besar

  // ── FAQ: PPID ──
  { id:40, cat:'ppid', channel:'all', title:'FAQ PPID — Apa itu PPID?',
    vars:['nama'],
    text:`Halo Bapak/Ibu *[nama]* 📂

Unduh *Aplikasi PPID Kemenkeu* di Play Store / App Store

let selectedId = null;
let activeCategory = 'all';
let searchQuery = '';

function init() {
  renderCategories();
  renderTemplates();
  updateCount();
}

function renderCategories() {
  const el = document.getElementById('catList');
  el.innerHTML = CATEGORIES.map(c => {
    const count = c.id === 'all' ? TEMPLATES.length :
      TEMPLATES.filter(t => t.cat === c.id).length;
    return `
      <div class="cat-item ${c.id === activeCategory ? 'active' : ''}" onclick="selectCat('${c.id}')">
        <div class="cat-icon" style="background:${c.bg}; color:${c.color}">${c.icon}</div>
        <div class="cat-text">
          <div class="cat-name">${c.name}</div>
        </div>
        <div class="cat-count">${count}</div>
      </div>`;
  }).join('');
}

function selectCat(id) {
  activeCategory = id;
  renderCategories();
  renderTemplates();
}

function filterTemplates() {
  searchQuery = document.getElementById('searchInput').value.toLowerCase();
  renderTemplates();
}

function getFiltered() {
  return TEMPLATES.filter(t => {
    const catMatch = activeCategory === 'all' || t.cat === activeCategory;
    const q = searchQuery;
    const textMatch = !q || t.title.toLowerCase().includes(q) || t.text.toLowerCase().includes(q);
    return catMatch && textMatch;
  });
}

function updateCount() {
  document.getElementById('visibleCount').textContent = getFiltered().length;
}

function renderTemplates() {
  const filtered = getFiltered();
  updateCount();
  const el = document.getElementById('templateList');

  if (!filtered.length) {
    el.innerHTML = `<div style="text-align:center;padding:60px 20px;color:var(--muted)">
      <div style="font-size:40px;margin-bottom:12px">🔍</div>
      <div style="font-size:14px">Template tidak ditemukan</div>
    </div>`;
    return;
  }

  el.innerHTML = filtered.map(t => {
    const tagClass = t.channel === 'wa' ? 'tag-wa' : t.channel === 'ig' ? 'tag-ig' : 'tag-all';
    const tagLabel = t.channel === 'wa' ? '💬 WhatsApp' : t.channel === 'ig' ? '📸 Instagram' : '🌐 Semua';
    return `
      <div class="tpl-card ${t.id === selectedId ? 'selected' : ''}" onclick="selectTemplate(${t.id})">
        <div class="tpl-top">
          <div class="tpl-title">${t.title}</div>
          <div class="tpl-tag ${tagClass}">${tagLabel}</div>
        </div>
        <div class="tpl-preview">${t.text.replace(/\*/g,'').substring(0,120)}...</div>
      </div>`;
  }).join('');
}

function selectTemplate(id) {
  selectedId = id;
  renderTemplates();
  const tpl = TEMPLATES.find(t => t.id === id);
  if (!tpl) return;

  const now = new Date();
  const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');

  let varsHtml = '';
  if (tpl.vars.length > 0) {
    varsHtml = `
      <div class="var-section">
        <div class="var-title">✏️ Isi Variabel</div>
        <div class="var-grid">
          ${tpl.vars.map(v => `
            <div class="var-row">
              <div class="var-label">[${v}]</div>
              <input class="var-input" id="var_${v}" placeholder="Isi ${v.replace(/_/g,' ')}..." oninput="updatePreview()">
            </div>`).join('')}
        </div>
      </div>`;
  }

  document.getElementById('previewBody').innerHTML = `
    ${varsHtml}
    <div class="bubble-wrap">
      <div class="bubble-header">
        <div class="bubble-avatar">BC</div>
        <div>
          <div class="bubble-name">CS Bea Cukai Pasuruan</div>
          <div class="bubble-sub">Customer Service</div>
        </div>
      </div>
      <div class="bubble-content">
        <div class="bubble">
          <p id="bubbleText">${formatText(tpl.text)}</p>
          <div class="bubble-time">${time} ✓✓</div>
        </div>
      </div>
    </div>`;

  document.getElementById('previewFooter').style.display = 'flex';
}

function formatText(t) {
  return t.replace(/\*/g,'<b>').replace(/\*$/,'</b>')
    .split('\n').join('<br>');
  // simpler: just show as-is
}

function updatePreview() {
  const tpl = TEMPLATES.find(t => t.id === selectedId);
  if (!tpl) return;
  let text = tpl.text;
  tpl.vars.forEach(v => {
    const val = document.getElementById('var_' + v)?.value || `[${v}]`;
    text = text.replaceAll(`[${v}]`, val || `[${v}]`);
  });
  const el = document.getElementById('bubbleText');
  if (el) el.innerHTML = text.split('\n').join('<br>');
}

function getFullText() {
  const tpl = TEMPLATES.find(t => t.id === selectedId);
  if (!tpl) return '';
  let text = tpl.text;
  tpl.vars.forEach(v => {
    const val = document.getElementById('var_' + v)?.value;
    text = text.replaceAll(`[${v}]`, val || `[${v}]`);
  });
  return text;
}

function copyTemplate() {
  const text = getFullText();
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  });
}

function openWA() {
  const text = encodeURIComponent(getFullText());
  window.open(`https://wa.me/?text=${text}`, '_blank');
}

init();
</script>
